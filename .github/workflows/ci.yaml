name: CI

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  nix:
    name: Nix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Evaluate flake and NixOS module
        run: |
          set -euo pipefail

          nix flake show --all-systems
          nix eval --raw .#packages.x86_64-linux.anipler-daemon.name; echo
          nix eval --raw .#packages.x86_64-linux.anipler-puller.name; echo
          nix eval --raw .#nixosModules.default --apply builtins.typeOf; echo

  nightly-release:
    name: Nightly Prerelease
    runs-on: ubuntu-latest
    needs:
      - rust
      - nix
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TARGETS: x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build static release archives
        run: |
          set -euo pipefail

          mkdir -p dist

          for target in ${RELEASE_TARGETS}; do
            rustup target add "${target}"
            cargo zigbuild --locked --release --target "${target}" --bins

            staging_dir="dist/anipler-${target}"
            mkdir -p "${staging_dir}"
            cp "target/${target}/release/anipler-daemon" "${staging_dir}/"
            cp "target/${target}/release/anipler-puller" "${staging_dir}/"
            tar -C dist -czf "dist/anipler-${target}.tar.gz" "anipler-${target}"
            rm -rf "${staging_dir}"
          done

          sha256sum dist/*.tar.gz > dist/SHA256SUMS

      - name: Create prerelease
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          tag="nightly-${timestamp}"
          title="nightly ${timestamp}"

          gh release create "${tag}" dist/* \
            --title "${title}" \
            --notes "Automated nightly prerelease for ${GITHUB_SHA}." \
            --prerelease \
            --target "${GITHUB_SHA}"
